name: Frontend Pipeline - CI/CD

on:
  push:
    branches: [ main, develop, 'feature/**' ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-pipeline.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
  workflow_call:
    inputs:
      product_api_ip:
        required: true
        type: string
      order_api_ip:
        required: true
        type: string
      environment:
        required: true
        type: string

env:
  ACR_LOGIN_SERVER: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  IMAGE_TAG: ${{ github.sha }}-${{ github.run_id }}
  NODE_VERSION: '18'

jobs:
  # Stage 1: Build and Test Frontend
  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: frontend
        run: |
          if [ -f package.json ]; then
            npm ci
            # Run linting if configured
            if npm run lint --dry-run 2>/dev/null; then
              npm run lint
            fi
            # Run tests if configured
            if npm run test --dry-run 2>/dev/null; then
              npm run test
            fi
          else
            echo "No package.json found, skipping npm steps"
          fi

  # Stage 2: Build Image (only on develop/main)
  build-frontend:
    needs: test-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and Push Frontend Image
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG="prod-${{ env.IMAGE_TAG }}"
          else
            TAG="staging-${{ env.IMAGE_TAG }}"
          fi
          
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/frontend:$TAG ./frontend/
          docker push ${{ env.ACR_LOGIN_SERVER }}/frontend:$TAG

      - name: Logout from Azure
        run: az logout
        if: always()

  # Stage 3: Deploy Frontend
  deploy-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "tag=prod-${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT
            echo "resource_group=${{ secrets.PRODUCTION_RESOURCE_GROUP }}" >> $GITHUB_OUTPUT
            echo "cluster_name=${{ secrets.PRODUCTION_AKS_CLUSTER }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "tag=staging-${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT
            echo "resource_group=${{ secrets.STAGING_RESOURCE_GROUP }}" >> $GITHUB_OUTPUT
            echo "cluster_name=${{ secrets.STAGING_AKS_CLUSTER }}" >> $GITHUB_OUTPUT
          fi

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        run: |
          az aks get-credentials \
            --resource-group ${{ steps.env.outputs.resource_group }} \
            --name ${{ steps.env.outputs.cluster_name }} \
            --overwrite-existing

      - name: Deploy Frontend
        run: |
          cd k8s/
          # Update image tag
          sed -i "s|latest|${{ steps.env.outputs.tag }}|g" frontend.yaml
          kubectl apply -f frontend.yaml

      - name: Logout from Azure
        run: az logout
        if: always()