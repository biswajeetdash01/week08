name: Backend Pipeline - CI/CD

on:
  push:
    branches: [ main, develop, 'feature/**' ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-pipeline.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

env:
  ACR_LOGIN_SERVER: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  IMAGE_TAG: ${{ github.sha }}-${{ github.run_id }}
  PYTHON_VERSION: '3.10'

jobs:
  # Stage 1: Testing
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      product_db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: products
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      order_db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orders
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          for req in backend/*/requirements.txt; do
            echo "Installing $req"
            pip install -r "$req"
          done
          pip install pytest httpx

      - name: Run product service tests
        working-directory: backend/product_service
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: products
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        run: pytest tests --maxfail=1 --disable-warnings -v

      - name: Run order service tests
        working-directory: backend/order_service
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5433
          POSTGRES_DB: orders
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        run: pytest tests --maxfail=1 --disable-warnings -v

  # Stage 2: Build (only on develop/main)
  build-backend:
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and Push Images
        run: |
          # Build with environment-specific tags
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG="prod-${{ env.IMAGE_TAG }}"
          else
            TAG="staging-${{ env.IMAGE_TAG }}"
          fi
          
          # Product Service
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/product_service:$TAG ./backend/product_service/
          docker push ${{ env.ACR_LOGIN_SERVER }}/product_service:$TAG
          
          # Order Service
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/order_service:$TAG ./backend/order_service/
          docker push ${{ env.ACR_LOGIN_SERVER }}/order_service:$TAG

      - name: Logout from Azure
        run: az logout
        if: always()

  # Stage 3: Deploy to Staging
  deploy-staging:
    needs: build-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.STAGING_RESOURCE_GROUP }} \
            --name ${{ secrets.STAGING_AKS_CLUSTER }} \
            --overwrite-existing

      - name: Deploy to Staging
        run: |
          cd k8s/
          # Update image tags for staging
          sed -i "s|latest|staging-${{ env.IMAGE_TAG }}|g" product-service.yaml
          sed -i "s|latest|staging-${{ env.IMAGE_TAG }}|g" order-service.yaml
          
          kubectl apply -f configmaps.yaml
          kubectl apply -f secrets.yaml
          kubectl apply -f product-db.yaml
          kubectl apply -f order-db.yaml
          kubectl apply -f product-service.yaml
          kubectl apply -f order-service.yaml

      - name: Logout from Azure
        run: az logout
        if: always()

  # Stage 4: Deploy to Production
  deploy-production:
    needs: build-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.PRODUCTION_RESOURCE_GROUP }} \
            --name ${{ secrets.PRODUCTION_AKS_CLUSTER }} \
            --overwrite-existing

      - name: Deploy to Production
        run: |
          cd k8s/
          # Update image tags for production
          sed -i "s|latest|prod-${{ env.IMAGE_TAG }}|g" product-service.yaml
          sed -i "s|latest|prod-${{ env.IMAGE_TAG }}|g" order-service.yaml
          
          kubectl apply -f configmaps.yaml
          kubectl apply -f secrets.yaml
          kubectl apply -f product-db.yaml
          kubectl apply -f order-db.yaml
          kubectl apply -f product-service.yaml
          kubectl apply -f order-service.yaml

      - name: Get Service IPs
        id: get-ips
        run: |
          # Wait for LoadBalancer IPs
          for i in {1..60}; do
            PRODUCT_IP=$(kubectl get service product-service-w08e1 -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            ORDER_IP=$(kubectl get service order-service-w08e1 -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            
            if [[ -n "$PRODUCT_IP" && -n "$ORDER_IP" ]]; then
              echo "product_ip=$PRODUCT_IP" >> $GITHUB_OUTPUT
              echo "order_ip=$ORDER_IP" >> $GITHUB_OUTPUT
              break
            fi
            sleep 5
          done

      - name: Logout from Azure
        run: az logout
        if: always()
    
    outputs:
      product_ip: ${{ steps.get-ips.outputs.product_ip }}
      order_ip: ${{ steps.get-ips.outputs.order_ip }}